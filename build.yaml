---
include:
  # Dongle (central) - Nordic nRF52840 Dongle PCA10059
  - board: nrf52840dongle_nrf52840
    shield: lily58_dongle
    artifact-name: lily58_dongle

  # Left half (peripheral) - dedicated shield avoids lily58_left's default central role
  - board: nice_nano_v2
    shield: lily58_left_peripheral
    artifact-name: lily58_left

  # Right half (peripheral)
  - board: nice_nano_v2
    shield: lily58_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: lily58_right

  # Settings reset firmware (flash on all devices before first use)
  - board: nrf52840dongle_nrf52840
    shield: settings_reset
    cmake-args: -DCONFIG_BUILD_OUTPUT_UF2=y
    artifact-name: settings_reset_dongle

  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: settings_reset_nice_nano
