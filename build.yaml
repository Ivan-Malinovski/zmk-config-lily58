---
include:
  # Dongle (central) - Makerdiary nRF52840-MDK-USB-Dongle
  - board: nrf52840_mdk_usb_dongle
    shield: lily58_dongle
    cmake-args: -DCONFIG_BUILD_OUTPUT_UF2=y
    artifact-name: lily58_dongle

  # Left half (peripheral)
  - board: nice_nano_v2
    shield: lily58_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: lily58_left

  # Right half (peripheral)
  - board: nice_nano_v2
    shield: lily58_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: lily58_right

  # Settings reset
  - board: nrf52840_mdk_usb_dongle
    shield: settings_reset
    cmake-args: -DCONFIG_BUILD_OUTPUT_UF2=y
    artifact-name: settings_reset_dongle

  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: settings_reset_nicenano
