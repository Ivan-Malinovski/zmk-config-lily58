CONFIG_ZMK_DISPLAY=n
CONFIG_ZMK_SLEEP=n

CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# Split peripheral settings
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# BLE connection limits (peripherals + BT profiles)
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7

# Disable dongle battery reporting (always powered via USB)
CONFIG_BT_BAS=n

# Disable unused serial/console
CONFIG_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_UART_INTERRUPT_DRIVEN=n

# Flash/NVS settings - required for storing BLE bonds on the dongle
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
